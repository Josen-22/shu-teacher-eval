<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 上海大学管理学院教师评价系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <div class="min-h-screen grid lg:grid-cols-2">
        <section class="hidden lg:flex bg-slate-900 text-white p-12 xl:p-16">
            <div class="max-w-xl m-auto">
                <div class="inline-flex items-center rounded-full border border-white/20 bg-white/10 px-4 py-2 text-sm">
                    <i class="fas fa-building-columns mr-2"></i>
                    上海大学管理学院
                </div>
                <h1 class="mt-8 text-5xl font-bold leading-tight">教师评价平台</h1>
                <p class="mt-6 text-lg leading-8 text-slate-300">
                    登录后查看教师信息、课程评价与课程库内容。
                </p>
                <div class="mt-10 grid gap-4 text-sm text-slate-300">
                    <div class="rounded-2xl border border-white/10 bg-white/5 p-5">
                        <div class="font-semibold text-white">查看教师资料</div>
                        <div class="mt-2">浏览研究方向、邮箱、简介和课程评价。</div>
                    </div>
                    <div class="rounded-2xl border border-white/10 bg-white/5 p-5">
                        <div class="font-semibold text-white">参与课程评价</div>
                        <div class="mt-2">登录后可补充课程信息并提交自己的课程体验。</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="flex items-center justify-center p-6 sm:p-10">
            <div class="w-full max-w-md">
                <div class="mb-8 text-center lg:hidden">
                    <div class="inline-flex items-center rounded-full bg-blue-100 px-4 py-2 text-sm font-medium text-blue-800">
                        <i class="fas fa-building-columns mr-2"></i>
                        上海大学管理学院教师评价平台
                    </div>
                </div>

                <div class="rounded-3xl bg-white p-8 shadow-xl shadow-slate-200/80 ring-1 ring-slate-200">
                    <div class="flex rounded-2xl bg-slate-100 p-1 text-sm font-medium">
                        <button id="tab-login" class="flex-1 rounded-xl bg-white px-4 py-3 text-slate-900 shadow-sm">登录</button>
                        <button id="tab-register" class="flex-1 rounded-xl px-4 py-3 text-slate-500">注册</button>
                    </div>

                    <div class="mt-8">
                        <div class="mb-6">
                            <h2 id="panel-title" class="text-3xl font-bold">欢迎回来</h2>
                            <p id="panel-desc" class="mt-2 text-sm text-slate-500">登录后进入教师评价主站。</p>
                        </div>

                        <form id="auth-form" class="space-y-4">
                            <div>
                                <label for="username" class="mb-2 block text-sm font-medium text-slate-700">用户名</label>
                                <input id="username" name="username" type="text" maxlength="80" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
                            </div>
                            <div>
                                <label for="password" class="mb-2 block text-sm font-medium text-slate-700">密码</label>
                                <input id="password" name="password" type="password" minlength="6" required class="w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100">
                            </div>

                            <div id="message" class="hidden rounded-2xl border px-4 py-3 text-sm"></div>

                            <button id="submit-btn" type="submit" class="w-full rounded-2xl bg-blue-700 px-4 py-3 font-semibold text-white transition hover:bg-blue-800 disabled:cursor-not-allowed disabled:bg-blue-300">
                                登录
                            </button>
                        </form>

                        <p class="mt-6 text-center text-sm text-slate-500">
                            登录即表示你将以实名外的普通用户名参与平台内容互动，请理性评价。
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const nextUrl = {{ next_url|tojson }};
        const tabs = {
            login: document.getElementById('tab-login'),
            register: document.getElementById('tab-register')
        };
        const titleEl = document.getElementById('panel-title');
        const descEl = document.getElementById('panel-desc');
        const formEl = document.getElementById('auth-form');
        const messageEl = document.getElementById('message');
        const submitBtn = document.getElementById('submit-btn');

        let mode = 'login';

        const setMode = (nextMode) => {
            mode = nextMode;
            const isLogin = mode === 'login';
            tabs.login.className = `flex-1 rounded-xl px-4 py-3 ${isLogin ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}`;
            tabs.register.className = `flex-1 rounded-xl px-4 py-3 ${!isLogin ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}`;
            titleEl.textContent = isLogin ? '欢迎回来' : '创建账号';
            descEl.textContent = isLogin ? '登录后进入教师评价主站。' : '注册后会自动登录并进入主站。';
            submitBtn.textContent = isLogin ? '登录' : '注册';
            clearMessage();
        };

        const showMessage = (text, type) => {
            messageEl.textContent = text;
            messageEl.className = `rounded-2xl border px-4 py-3 text-sm ${type === 'error' ? 'border-red-200 bg-red-50 text-red-700' : 'border-emerald-200 bg-emerald-50 text-emerald-700'}`;
        };

        const clearMessage = () => {
            messageEl.textContent = '';
            messageEl.className = 'hidden rounded-2xl border px-4 py-3 text-sm';
        };

        tabs.login.addEventListener('click', () => setMode('login'));
        tabs.register.addEventListener('click', () => setMode('register'));

        formEl.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearMessage();
            submitBtn.disabled = true;

            const payload = {
                username: formEl.username.value.trim(),
                password: formEl.password.value
            };

            try {
                const response = await fetch(mode === 'login' ? '/api/login' : '/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    showMessage(data.error || (mode === 'login' ? '登录失败' : '注册失败'), 'error');
                    return;
                }
                showMessage(mode === 'login' ? '登录成功，正在跳转...' : '注册成功，正在跳转...', 'success');
                window.location.href = nextUrl || '/';
            } catch (error) {
                showMessage(mode === 'login' ? '登录失败，请稍后重试' : '注册失败，请稍后重试', 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });

        setMode('login');
    </script>
</body>
</html>
